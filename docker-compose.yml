version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: queue-mysql
    restart: always
    environment:
      MYSQL_DATABASE: queue_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: queue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
