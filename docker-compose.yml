services:
  queue-api:
    build:
      context: .
      dockerfile: queue-api/Dockerfile
    container_name: queue-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      QUEUE_DB_URL: jdbc:mysql://mysql:3306/queue_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      QUEUE_DB_USERNAME: root
      QUEUE_DB_PASSWORD: root
      QUEUE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUEUE_KAFKA_CONSUMER_GROUP: queue-lifecycle-audit-v1
    depends_on:
      - mysql
      - redis
      - kafka

  mysql:
    image: mysql:8.0
    container_name: queue-mysql
    restart: always
    environment:
      MYSQL_DATABASE: queue_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: queue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  kafka:
    image: bitnami/kafka:3.8
    container_name: queue-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/bitnami/kafka

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: queue-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - queue-api

  grafana:
    image: grafana/grafana:11.1.4
    container_name: queue-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  kafka-data:
