spring:
  datasource:
    url: ${QUEUE_DB_URL:jdbc:mysql://localhost:3306/queue_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${QUEUE_DB_USERNAME:root}
    password: ${QUEUE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: ${QUEUE_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${QUEUE_KAFKA_CONSUMER_GROUP:queue-lifecycle-audit-v1}
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.queue.infrastructure.queue.kafka.QueueLifecycleEventMessage
        spring.json.trusted.packages: com.queue.infrastructure.queue.kafka
    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: queue-api

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId:-} eventId=%X{eventId:-} topic=%X{kafkaTopic:-} partition=%X{kafkaPartition:-} offset=%X{kafkaOffset:-} - %msg%n"

queue:
  worker:
    promotion:
      queue-id: default
      batch-size: 50
      max-active-count: 100
      active-ttl-seconds: 180

    expiration:
      enabled: true
      fixed-delay-ms: 1000
      batch-size: 50

  kafka:
    lifecycle-topic: queue.lifecycle.v1
    lifecycle-consumer-group: ${QUEUE_KAFKA_CONSUMER_GROUP:queue-lifecycle-audit-v1}
    lifecycle-dlt-topic: ${QUEUE_KAFKA_DLT_TOPIC:queue.lifecycle.v1.dlt}
    consumer-max-attempts: ${QUEUE_KAFKA_CONSUMER_MAX_ATTEMPTS:3}
    consumer-backoff-ms: ${QUEUE_KAFKA_CONSUMER_BACKOFF_MS:1000}

  audit:
    retention:
      enabled: ${QUEUE_AUDIT_RETENTION_ENABLED:true}
      fixed-delay-ms: ${QUEUE_AUDIT_RETENTION_FIXED_DELAY_MS:300000}
      retention-days: ${QUEUE_AUDIT_RETENTION_DAYS:30}
      batch-size: ${QUEUE_AUDIT_RETENTION_BATCH_SIZE:500}
