server:
  port: ${QUEUE_API_PORT:8081}

spring:
  datasource:
    url: ${QUEUE_DB_URL:jdbc:mysql://localhost:3307/queue_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${QUEUE_DB_USERNAME:root}
    password: ${QUEUE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  kafka:
    bootstrap-servers: ${QUEUE_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${QUEUE_KAFKA_CONSUMER_GROUP:queue-lifecycle-audit-v1}
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.queue.infrastructure.queue.kafka.QueueLifecycleEventMessage
        spring.json.trusted.packages: com.queue.infrastructure.queue.kafka
    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: queue-api